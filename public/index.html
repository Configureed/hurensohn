<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Server Cloner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Discord Server Cloner</h1>
        
        <div id="login-section" class="section">
            <h2>Login</h2>
            <input type="text" id="token-input" placeholder="Enter your Discord token">
            <button id="login-btn">Login</button>
            <p id="login-error" class="error"></p>
        </div>

        <div id="server-section" class="section" style="display: none;">
            <h2 id="welcome-text">Welcome, User!</h2>
            
            <div class="server-selection">
                <div class="server-group">
                    <label>Source Server (to copy from)</label>
                    <select id="source-server"></select>
                </div>
                <div class="server-group">
                    <label>Target Server (to copy to)</label>
                    <select id="target-server"></select>
                </div>
            </div>

            <button id="clone-btn" class="clone-btn">Clone Server</button>
            <p id="clone-status" class="status"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
