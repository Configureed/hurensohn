<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DarkBox - Upload</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header class="brand">
      <h1>DarkBox</h1>
      <p class="subtitle">Uploads bis 200 MB — dunkles Theme</p>
    </header>

    <main>
      <form id="uploadForm" class="upload-box">
        <input id="fileInput" type="file" name="file" />
        <button id="uploadBtn" type="submit">Datei hochladen</button>
      </form>

      <section class="links">
        <h2>Letzte Uploads</h2>
        <div id="filesList"></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
