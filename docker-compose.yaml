version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: nexus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: nexus-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/nexus?authSource=admin
      - JWT_SECRET=nexus_super_secret_key_2024_secure_32_chars
      - JWT_EXPIRE=7d
      - API_BASE_URL=http://localhost:5000
      - CLIENT_URL=http://localhost:3000
      - ENCRYPTION_SALT=nexus_encryption_salt_2024
      - RATE_LIMIT=100
      - NODE_ENV=development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nexus-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongo_data: